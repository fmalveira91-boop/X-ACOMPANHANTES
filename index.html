<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-ACOMPANHANTES | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .app-card { background: #0a0a0a; border-radius: 30px; overflow: hidden; margin-bottom: 30px; border: 1px solid #1a1a1a; }
        .snap-x { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .snap-item { scroll-snap-align: start; flex: 0 0 100%; width: 100%; height: 500px; object-fit: cover; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-top: 1px solid #222; }
        .hidden { display: none; }
        input[type="file"] { display: none; }
        .upload-btn { background: #111; border: 2px dashed #333; padding: 40px; border-radius: 20px; text-align: center; cursor: pointer; }
        .btn-disabled { opacity: 0.2; pointer-events: none; }
        .pink-glow { text-shadow: 0 0 15px rgba(255, 0, 85, 0.6); }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center sticky top-0 z-[100] bg-black/95 backdrop-blur-md border-b border-zinc-900">
        <h1 onclick="showTab('home')" class="text-2xl font-black italic text-pink-600 tracking-tighter cursor-pointer pink-glow">X-ACOMPANHANTES</h1>
        <button onclick="showTab('anunciar')" class="bg-pink-600 px-5 py-2 rounded-full text-[10px] font-black uppercase">Anunciar</button>
    </header>

    <main id="tab-home" class="p-4 pb-40">
        <div id="grid-modelos" class="space-y-6">
            <div class="text-center py-20 text-zinc-800 font-bold uppercase tracking-widest italic animate-pulse">A ligar à rede...</div>
        </div>
    </main>

    <section id="tab-anunciar" class="hidden p-6 pb-40">
        <div class="max-w-md mx-auto space-y-6">
            <h2 class="text-3xl font-black italic text-pink-600">NOVO PERFIL</h2>
            <div class="space-y-4">
                <input type="text" id="nome-m" placeholder="Nome Profissional" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">
                <div class="flex gap-2">
                    <input type="number" id="idade-m" placeholder="Idade" class="w-1/2 bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">
                    <input type="text" id="valor-m" placeholder="Preço €" class="w-1/2 bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">
                </div>
                <input type="text" id="tel-m" placeholder="WhatsApp (ex: 351912...)" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">

                <label class="upload-btn block" id="label-file">
                    <i class="fas fa-camera text-3xl mb-2 text-pink-600"></i>
                    <p id="texto-upload" class="text-sm font-bold uppercase tracking-widest">Abrir Galeria</p>
                    <input type="file" id="file-input" multiple accept="image/*,video/*">
                </label>
                
                <div id="status-msg" class="text-center text-[10px] font-bold uppercase tracking-widest text-zinc-500">Aguardando fotos...</div>

                <button onclick="enviarTudo()" id="btn-publicar" class="btn-disabled w-full bg-white text-black p-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Publicar Agora</button>
            </div>
        </div>
    </section>

    <div onclick="abrirAdmin()" style="position: fixed; bottom: 120px; left: 25px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);">
        <i class="fas fa-lock text-zinc-600 text-xs"></i>
    </div>

    <div id="painelAdmin" class="hidden fixed inset-0 z-[200] bg-black p-6 overflow-y-auto">
        <h2 class="text-xl font-black italic text-yellow-500 mb-6 border-b border-zinc-800 pb-2 uppercase">Aprovações</h2>
        <div id="lista-pendentes" class="space-y-4"></div>
        <button onclick="document.getElementById('painelAdmin').classList.add('hidden')" class="mt-10 text-zinc-600 text-[10px] font-bold uppercase tracking-widest underline">Voltar</button>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[35px] flex justify-around items-center z-[150] shadow-2xl">
        <div onclick="showTab('home')" class="text-pink-600 text-xl"><i class="fas fa-fire"></i></div>
        <div onclick="showTab('anunciar')" class="text-zinc-500 text-xl"><i class="fas fa-plus-circle"></i></div>
    </nav>

    <script>
        // TUAS CHAVES REAIS APLICADAS
        const firebaseConfig = {
            apiKey: "AIzaSyCzOCyLJjILaLYWejWRRo3o-2IjzNsNvrk",
            authDomain: "x-acompanhantes.firebaseapp.com",
            projectId: "x-acompanhantes",
            storageBucket: "x-acompanhantes.firebasestorage.app",
            messagingSenderId: "845747730590",
            appId: "1:845747730590:web:52b4be5b58936421aa638f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let linksArquivos = [];

        // LÓGICA DE UPLOAD
        document.getElementById('file-input').onchange = async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;

            const btn = document.getElementById('btn-publicar');
            const msg = document.getElementById('status-msg');
            const texto = document.getElementById('texto-upload');
            
            btn.classList.add('btn-disabled');
            msg.innerText = "⏳ A subir para o servidor...";
            msg.style.color = "#eab308";
            linksArquivos = [];

            try {
                for (let file of files) {
                    const ref = storage.ref(`modelos/${Date.now()}-${file.name}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    linksArquivos.push({url, type: file.type});
                }
                msg.innerText = "✅ Concluído! Já podes publicar.";
                msg.style.color = "#22c55e";
                texto.innerText = `${files.length} selecionados`;
                btn.classList.remove('btn-disabled');
            } catch (err) {
                console.error(err);
                msg.innerText = "❌ Erro: Verifica as REGRAS no Storage!";
                msg.style.color = "#ef4444";
            }
        };

        async function enviarTudo() {
            const nome = document.getElementById('nome-m').value;
            if(!nome || linksArquivos.length === 0) return alert("Falta o nome ou as fotos!");
            
            await db.collection("modelos").add({
                nome,
                idade: document.getElementById('idade-m').value || '?',
                valor: document.getElementById('valor-m').value || '?',
                tel: document.getElementById('tel-m').value || '',
                media: linksArquivos,
                aprovado: false,
                data: new Date()
            });
            alert("Perfil enviado com sucesso!");
            location.reload();
        }

        function carregarModelos() {
            db.collection("modelos").where("aprovado", "==", true).onSnapshot(snap => {
                const grid = document.getElementById('grid-modelos');
                grid.innerHTML = snap.empty ? "<p class='text-center text-zinc-800 py-20 text-xs font-bold uppercase tracking-widest'>Sem perfis ativos</p>" : "";
                snap.forEach(doc => {
                    const m = doc.data();
                    let slides = '';
                    m.media.forEach(item => {
                        if(item.type.includes('video')) {
                            slides += `<video src="${item.url}" class="snap-item" controls loop muted playsinline></video>`;
                        } else {
                            slides += `<img src="${item.url}" class="snap-item" loading="lazy">`;
                        }
                    });

                    grid.innerHTML += `
                    <div class="app-card">
                        <div class="snap-x">${slides}</div>
                        <div class="p-6 bg-zinc-900/20">
                            <div class="flex justify-between items-center mb-4">
                                <div><h3 class="text-2xl font-black italic uppercase">${m.nome}</h3><p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">${m.idade} ANOS</p></div>
                                <div class="text-pink-500 font-black text-xl">${m.valor}€</div>
                            </div>
                            <a href="https://wa.me/${m.tel}" target="_blank" class="bg-green-600 flex justify-center p-4 rounded-2xl font-black text-xs uppercase tracking-widest"><i class="fab fa-whatsapp text-lg mr-2"></i> Reservar Agora</a>
                        </div>
                    </div>`;
                });
            });
        }

        function showTab(t) {
            document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
            document.getElementById('tab-anunciar').classList.toggle('hidden', t !== 'anunciar');
        }

        function abrirAdmin() {
            if(prompt("SENHA ADMIN:") === "olokobicho77") {
                document.getElementById('painelAdmin').classList.remove('hidden');
                db.collection("modelos").where("aprovado", "==", false).onSnapshot(snap => {
                    const l = document.getElementById('lista-pendentes');
                    l.innerHTML = snap.empty ? "<p class='text-zinc-600 text-center text-xs'>Nada para aprovar.</p>" : "";
                    snap.forEach(doc => {
                        l.innerHTML += `<div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center mb-2"><span>${doc.data().nome}</span><button onclick="aprovar('${doc.id}')" class="bg-green-600 text-white px-4 py-2 rounded-full font-bold text-[10px]">APROVAR</button></div>`;
                    });
                });
            }
        }
        function aprovar(id) { db.collection("modelos").doc(id).update({ aprovado: true }); }
        carregarModelos();
    </script>
</body>
</html>
