<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-ACOMPANHANTES | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .app-card { background: #0a0a0a; border-radius: 30px; overflow: hidden; margin-bottom: 30px; border: 1px solid #1a1a1a; }
        .snap-item { width: 100%; height: 500px; object-fit: cover; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-top: 1px solid #222; }
        .hidden { display: none; }
        .uploadcare--widget__button_type_open {
            background: #db2777 !important; border-radius: 15px !important; padding: 15px !important; font-weight: bold !important;
        }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center sticky top-0 z-[100] bg-black border-b border-zinc-900">
        <h1 onclick="showTab('home')" class="text-2xl font-black italic text-pink-600 tracking-tighter cursor-pointer">X-ACOMPANHANTES</h1>
        <button onclick="showTab('anunciar')" class="bg-pink-600 px-5 py-2 rounded-full text-[10px] font-black uppercase">Anunciar</button>
    </header>

    <main id="tab-home" class="p-4 pb-40">
        <div id="grid-modelos" class="space-y-6">
            <p class="text-center py-20 text-zinc-800">A carregar elite...</p>
        </div>
    </main>

    <section id="tab-anunciar" class="hidden p-6 pb-40">
        <form id="form-anuncio" class="max-w-md mx-auto space-y-4">
            <h2 class="text-2xl font-black italic text-pink-600 uppercase">Novo Perfil</h2>
            
            <input type="text" name="data[nome]" placeholder="Nome" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800" required>
            
            <input type="text" name="data[cidade]" placeholder="Cidade (Ex: Lisboa)" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800" required>

            <div class="flex gap-2">
                <input type="number" name="data[idade]" placeholder="Idade" class="w-1/2 bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">
                <input type="text" name="data[valor]" placeholder="Preço €" class="w-1/2 bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">
            </div>

            <input type="text" name="data[tel]" placeholder="WhatsApp" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">

            <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 text-center">
                <p class="text-xs font-bold text-zinc-500 mb-4 uppercase">Fotos e Vídeos da Galeria</p>
                <input type="hidden" role="uploadcare-uploader" 
                       name="data[fotos]" 
                       data-public-key="3027e0eb84735c5c7066" 
                       data-multiple="true" />
            </div>

            <input type="hidden" name="data[aprovado]" value="não">
            <button type="submit" id="btn-submit" class="w-full bg-white text-black p-5 rounded-2xl font-black uppercase tracking-widest">Publicar Perfil</button>
        </form>
    </section>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[35px] flex justify-around items-center z-[150]">
        <div onclick="showTab('home')" class="text-pink-600 text-xl"><i class="fas fa-fire"></i></div>
        <div onclick="showTab('anunciar')" class="text-zinc-500 text-xl"><i class="fas fa-plus-circle"></i></div>
    </nav>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/yi889rrw0okh5";

        function showTab(t) {
            document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
            document.getElementById('tab-anunciar').classList.toggle('hidden', t !== 'anunciar');
        }

        document.getElementById('form-anuncio').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "A ENVIAR...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            await fetch(SHEETDB_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: data })
            });

            alert("Perfil enviado!");
            location.reload();
        };

        async function carregarModelos() {
            try {
                const res = await fetch(SHEETDB_URL + "/search?aprovado=sim");
                const modelos = await res.json();
                const grid = document.getElementById('grid-modelos');
                grid.innerHTML = "";
                
                modelos.forEach(m => {
                    const fotoPrincipal = m.fotos + "-/preview/";

                    grid.innerHTML += `
                    <div class="app-card">
                        <img src="${fotoPrincipal}" class="snap-item">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-2xl font-black italic uppercase">${m.nome}</h3>
                                    <p class="text-pink-500 text-[10px] font-bold uppercase tracking-widest">
                                        <i class="fas fa-map-marker-alt mr-1"></i> ${m.cidade}
                                    </p>
                                    <p class="text-zinc-500 text-xs mt-1">${m.idade} ANOS</p>
                                </div>
                                <div class="text-white font-black text-xl">${m.valor}€</div>
                            </div>
                            <a href="https://wa.me/${m.tel}" class="bg-green-600 flex justify-center p-4 rounded-2xl font-black text-xs uppercase"><i class="fab fa-whatsapp text-lg mr-2"></i> Reservar</a>
                        </div>
                    </div>`;
                });
            } catch (e) {
                grid.innerHTML = "<p class='text-center text-zinc-800'>Nenhum perfil aprovado.</p>";
            }
        }

        carregarModelos();
    </script>
</body>
</html>
