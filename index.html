<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-ACOMPANHANTES | Elite Portugal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .admin-panel { display: none; position: fixed; inset: 0; z-index: 10000; background: #0a0a0a; overflow-y: auto; padding: 20px; }
        .admin-panel.active { display: block; }
    </style>
</head>
<body>

    <nav class="p-5 glass flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black italic text-pink-600">X-ACOMPANHANTES</h1>
        <button onclick="openTab('anunciar')" class="bg-pink-600 px-4 py-2 rounded-full font-bold text-sm">ANUNCIAR</button>
    </nav>

    <div id="main-content" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
        <p class="col-span-full text-center text-gray-500 py-10">Carregando modelos verificadas...</p>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">Painel de Gestão</h2>
                <button onclick="closeAdmin()" class="text-gray-400 text-xl">&times; Fechar</button>
            </div>
            
            <div id="pendingModels" class="space-y-4">
                <p class="text-gray-400 text-center">Nenhuma modelo pendente para aprovação.</p>
                </div>
        </div>
    </div>

    <div onclick="openAdmin()" style="position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; cursor: pointer;">
        <i class="fas fa-lock text-gray-600 text-xs"></i>
    </div>

    <script>
        // FUNÇÃO PARA ABRIR O ADMIN (SEM ERROS)
        function openAdmin() {
            const pass = prompt("Introduza a senha de acesso:");
            if (pass === "157157") { // ALTERA "157157" PARA A TUA SENHA
                document.getElementById('adminPanel').classList.add('active');
            } else {
                alert("Acesso Negado!");
            }
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
        }

        // LÓGICA DE ATALHO DE TECLADO
        let inputBuffer = "";
        window.addEventListener("keydown", (e) => {
            inputBuffer += e.key;
            if (inputBuffer.endsWith("admin")) {
                openAdmin();
                inputBuffer = "";
            }
        });

        // NOTA: Aqui deves manter a tua configuração do Firebase 
        // para buscar (fetch) as modelos e preencher as divs.
    </script>
</body>
</html>
