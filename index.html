<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-ACOMPANHANTES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .app-card { background: #0a0a0a; border-radius: 30px; overflow: hidden; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .snap-item { width: 100%; height: 500px; object-fit: cover; }
        .hidden { display: none; }
        .swiper { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-black">
        <h1 onclick="location.reload()" class="text-xl font-black italic text-pink-600 uppercase cursor-pointer">X-ACOMPANHANTES</h1>
        <button onclick="showTab('anunciar')" class="bg-pink-600 px-4 py-2 rounded-full text-xs font-bold uppercase">Anunciar</button>
    </header>

    <main id="tab-home" class="p-4 pb-32">
        <div id="grid-modelos"></div>
    </main>

    <section id="tab-anunciar" class="hidden p-6 pb-32">
        <form id="form-anuncio" class="space-y-4">
            <input type="text" name="nome" placeholder="Nome" class="w-full bg-zinc-900 p-4 rounded-xl" required>
            <input type="text" name="cidade" placeholder="Cidade" class="w-full bg-zinc-900 p-4 rounded-xl" required>
            <input type="text" name="tel" placeholder="WhatsApp (351...)" class="w-full bg-zinc-900 p-4 rounded-xl" required>
            <input type="hidden" role="uploadcare-uploader" name="fotos" id="foto-input" data-public-key="3027e0eb84735c5c7066" data-multiple="true" />
            <input type="hidden" name="aprovado" value="nao">
            <button type="submit" id="btn-submit" class="w-full bg-white text-black p-4 rounded-xl font-bold uppercase opacity-50" disabled>Carrega as fotos primeiro</button>
        </form>
    </section>
    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/yi889rrw0okh5";
        
        const widget = uploadcare.Widget('#foto-input');
        widget.onUploadComplete(() => {
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-submit').classList.remove('opacity-50');
            document.getElementById('btn-submit').innerText = "PUBLICAR AGORA";
        });

        function showTab(t) {
            document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
            document.getElementById('tab-anunciar').classList.toggle('hidden', t !== 'anunciar');
        }

        async function carregarModelos() {
            const res = await fetch(SHEETDB_URL + "/search?aprovado=sim");
            const modelos = await res.json();
            const grid = document.getElementById('grid-modelos');
            grid.innerHTML = "";
            
            modelos.forEach((m, idx) => {
                const gid = `g-${idx}`;
                // CORREÇÃO DO LINK: Corta o ~5/ e limpa o URL
                let base = m.fotos.split('~')[0].split('nth/')[0];
                if(!base.endsWith('/')) base += '/';

                let slides = "";
                for(let i=0; i<5; i++) {
                    slides += `<div class="swiper-slide"><img src="${base}nth/${i}/" class="snap-item" onerror="this.parentElement.remove()"></div>`;
                }

                grid.innerHTML += `
                <div class="app-card">
                    <div class="swiper ${gid}"><div class="swiper-wrapper">${slides}</div></div>
                    <div class="p-6">
                        <h3 class="text-2xl font-bold uppercase italic">${m.nome}</h3>
                        <p class="text-pink-600 text-sm font-bold uppercase">${m.cidade}</p>
                        <a href="https://wa.me/${m.tel}" class="bg-green-600 block text-center p-3 rounded-xl mt-4 font-bold">WHATSAPP</a>
                    </div>
                </div>`;
                setTimeout(() => { new Swiper(`.${gid}`, { observer: true, observeParents: true }); }, 300);
            });
        }
        carregarModelos();
    </script>
</body>
</html>
