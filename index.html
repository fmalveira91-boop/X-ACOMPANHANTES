<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-ACOMPANHANTES | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .app-card { background: #0a0a0a; border-radius: 30px; overflow: hidden; margin-bottom: 30px; border: 1px solid #1a1a1a; }
        .snap-item { width: 100%; height: 550px; object-fit: cover; background: #000; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-top: 1px solid #222; }
        .hidden { display: none; }
        .swiper { width: 100%; height: 550px; }
        .swiper-pagination-bullet { background: #db2777 !important; }
        .uploadcare--widget__button_type_open {
            background: #db2777 !important; border-radius: 12px !important; padding: 10px !important; border: none !important;
        }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center sticky top-0 z-[100] bg-black border-b border-zinc-900">
        <h1 onclick="showTab('home')" class="text-2xl font-black italic text-pink-600 cursor-pointer">X-ACOMPANHANTES</h1>
        <button onclick="showTab('anunciar')" class="bg-pink-600 px-5 py-2 rounded-full text-[10px] font-black uppercase">Anunciar</button>
    </header>

    <main id="tab-home" class="p-4 pb-40 max-w-7xl mx-auto">
        <div id="grid-modelos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-20 text-zinc-800 font-bold uppercase animate-pulse">A carregar...</p>
        </div>
    </main>

    <section id="tab-anunciar" class="hidden p-6 pb-40">
        <form id="form-anuncio" class="max-w-md mx-auto space-y-4">
            <h2 class="text-2xl font-black italic text-pink-600 uppercase">Novo Perfil</h2>
            <input type="text" name="nome" placeholder="Nome Profissional" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800" required>
            <input type="text" name="cidade" placeholder="Cidade" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800" required>
            <div class="flex gap-2">
                <input type="number" name="idade" placeholder="Idade" class="w-1/2 bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">
                <input type="text" name="valor" placeholder="Preço €" class="w-1/2 bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800">
            </div>
            <input type="text" name="tel" placeholder="WhatsApp (35191...)" class="w-full bg-zinc-900 p-5 rounded-2xl outline-none border border-zinc-800" required>
            
            <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800 text-center">
                <p class="text-[10px] font-bold text-zinc-500 mb-3 uppercase">Carregar Fotos (Modo Revista)</p>
                <input type="hidden" role="uploadcare-uploader" name="fotos" id="foto-input"
                       data-public-key="3027e0eb84735c5c7066" 
                       data-multiple="true" data-tabs="file camera" />
            </div>

            <input type="hidden" name="aprovado" value="nao">
            <button type="submit" id="btn-submit" class="w-full bg-white text-black p-5 rounded-2xl font-black uppercase tracking-widest opacity-50 cursor-not-allowed" disabled>Carregar Fotos Primeiro</button>
        </form>
    </section>

    <div onclick="abrirAdmin()" style="position: fixed; bottom: 120px; left: 25px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; border: 1px solid rgba(255,255,255,0.1);">
        <i class="fas fa-lock text-zinc-600 text-xs"></i>
    </div>

    <div id="painelAdmin" class="hidden fixed inset-0 z-[200] bg-black p-6 overflow-y-auto">
        <h2 class="text-xl font-black text-yellow-500 italic mb-6 uppercase">Pendentes</h2>
        <div id="lista-pendentes" class="space-y-4"></div>
        <button onclick="document.getElementById('painelAdmin').classList.add('hidden')" class="mt-10 text-zinc-600 text-[10px] font-bold uppercase underline">Voltar</button>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[35px] flex justify-around items-center z-[150] shadow-2xl">
        <div onclick="showTab('home')" class="text-pink-600 text-xl cursor-pointer"><i class="fas fa-fire"></i></div>
        <div onclick="showTab('anunciar')" class="text-zinc-500 text-xl cursor-pointer"><i class="fas fa-plus-circle"></i></div>
    </nav>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/yi889rrw0okh5";

        // Trava de segurança para o botão
        const widget = uploadcare.Widget('#foto-input');
        widget.onUploadComplete(() => {
            const btn = document.getElementById('btn-submit');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btn.innerText = "Publicar Agora";
        });

        function showTab(t) {
            document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
            document.getElementById('tab-anunciar').classList.toggle('hidden', t !== 'anunciar');
        }

        document.getElementById('form-anuncio').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "A GUARDAR...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            await fetch(SHEETDB_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: data })
            });

            alert("Perfil enviado! Aguarde aprovação.");
            location.reload();
        };

        async function carregarModelos() {
            try {
                const res = await fetch(SHEETDB_URL + "/search?aprovado=sim");
                const modelos = await res.json();
                const grid = document.getElementById('grid-modelos');
                grid.innerHTML = modelos.length ? "" : "<p class='text-center py-20 text-zinc-800 font-bold'>SEM ANÚNCIOS ATIVOS</p>";
                
                modelos.forEach((m, idx) => {
                    const galeriaId = `galeria-${idx}`;
                    let slides = "";
                    
                    // Criação dos slides (Modo Revista)
                    for(let i=0; i<6; i++) {
                        const linkBase = m.fotos.split('nth/')[0].split('~')[0];
                        const fotoFinal = `${linkBase}nth/${i}/-/preview/600x800/-/quality/smart/`;
                        slides += `<div class="swiper-slide"><img src="${fotoFinal}" class="snap-item" onerror="this.parentElement.remove()"></div>`;
                    }

                    grid.innerHTML += `
                    <div class="app-card">
                        <div class="swiper ${galeriaId}"><div class="swiper-wrapper">${slides}</div><div class="swiper-pagination"></div></div>
                        <div class="p-6">
                            <h3 class="text-2xl font-black italic uppercase">${m.nome}</h3>
                            <p class="text-pink-600 text-[10px] font-bold uppercase">📍 ${m.cidade}</p>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-zinc-500 text-xs font-bold uppercase">${m.idade} ANOS</span>
                                <span class="text-white font-black text-xl">${m.valor}€</span>
                            </div>
                            <a href="https://wa.me/${m.tel}" class="bg-green-600 flex justify-center p-4 rounded-2xl font-black text-xs uppercase mt-4 shadow-lg"><i class="fab fa-whatsapp mr-2"></i> WhatsApp</a>
                        </div>
                    </div>`;

                    setTimeout(() => { new Swiper(`.${galeriaId}`, { pagination: { el: '.swiper-pagination', clickable: true } }); }, 200);
                });
            } catch (e) { console.log("Erro ao carregar"); }
        }

        async function abrirAdmin() {
            if(prompt("PASSWORD ADMIN:") === "olokobicho77") {
                document.getElementById('painelAdmin').classList.remove('hidden');
                const res = await fetch(SHEETDB_URL + "/search?aprovado=nao");
                const pendentes = await res.json();
                const container = document.getElementById('lista-pendentes');
                container.innerHTML = pendentes.length ? "" : "Nada pendente.";
                pendentes.forEach(p => {
                    container.innerHTML += `<div class="bg-zinc-900 p-4 rounded-2xl flex justify-between items-center mb-2"><span>${p.nome}</span><button onclick="aprovar('${p.nome}')" class="bg-green-600 text-[10px] font-bold px-4 py-2 rounded-full uppercase">Aprovar</button></div>`;
                });
            }
        }

        async function aprovar(nome) {
            await fetch(SHEETDB_URL + "/nome/" + nome, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: {aprovado: 'sim'}}) });
            alert("Perfil Aprovado!");
            location.reload();
        }

        carregarModelos();
    </script>
</body>
</html>
